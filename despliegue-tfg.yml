AWSTemplateFormatVersion: "2010-09-09"
Description: "Infraestructura TFG: VPC, Subredes, Security Groups, Instancias y Enrutamiento"

Parameters:
  KeyName:
    Description: Par de claves (.pem) para acceder a las instancias
    Type: AWS::EC2::KeyPair::KeyName
  LatestUbuntuAMI:
    Description: Ubuntu 22.04 LTS (auto)
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id"
  LatestWindowsAMI:
    Description: Windows Server 2022 (auto)
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base"
  SafeModePassword:
    Description: Contrasena del modo seguro de Active Directory (DSRM)
    Type: String
    NoEcho: true
    MinLength: 8
  TelegramBotToken:
    Description: Token del bot de Telegram para Alertmanager
    Type: String
    NoEcho: true
    Default: ""
  TelegramChatId:
    Description: Chat ID del grupo de Telegram para Alertmanager
    Type: String
    NoEcho: true
    Default: ""

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC-TFG

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  SubnetPublica:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Subred-Publica-DMZ

  SubnetPrivada:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: Subred-Privada-Intranet

  SGGateway:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Gateway Ubuntu - SSH, WireGuard, Prometheus y trafico interno
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 9090
          ToPort: 9090
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 9093
          ToPort: 9093
          CidrIp: 10.0.0.0/16
        - IpProtocol: udp
          FromPort: 51820
          ToPort: 51820
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1
          CidrIp: 10.0.2.0/24
        - IpProtocol: -1
          CidrIp: 172.16.3.0/24

  SGInternal:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Windows Server - Acceso desde Gateway y VPN
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 172.16.3.0/24
        - IpProtocol: tcp
          FromPort: 9182
          ToPort: 9182
          SourceSecurityGroupId: !Ref SGGateway
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          SourceSecurityGroupId: !Ref SGGateway
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 172.16.3.0/24
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          SourceSecurityGroupId: !Ref SGGateway
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          SourceSecurityGroupId: !Ref SGGateway
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          SourceSecurityGroupId: !Ref SGGateway

  UbuntuGateway:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestUbuntuAMI
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: "0"
          SubnetId: !Ref SubnetPublica
          GroupSet: [!Ref SGGateway]
      SourceDestCheck: false
      Tags:
        - Key: Name
          Value: Ubuntu-Gateway-TFG
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          sysctl -w net.ipv4.ip_forward=1
          echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
          iptables -t nat -A POSTROUTING -s 10.0.2.0/24 -o ens5 -j MASQUERADE
          iptables -t nat -A POSTROUTING -s 172.16.3.0/24 -d 10.0.2.0/24 -j MASQUERADE
          iptables -A FORWARD -s 172.16.3.0/24 -d 10.0.2.0/24 -j ACCEPT
          iptables -A FORWARD -s 10.0.2.0/24 -d 172.16.3.0/24 -m state --state RELATED,ESTABLISHED -j ACCEPT
          PRIVATE_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)
          iptables -t nat -A PREROUTING -p tcp -d $PRIVATE_IP --dport 3389 -j DNAT --to-destination 10.0.2.75:3389
          iptables -t nat -A POSTROUTING -p tcp -d 10.0.2.75 --dport 3389 -j MASQUERADE
          iptables -A FORWARD -p tcp -d 10.0.2.75 --dport 3389 -m state --state NEW,ESTABLISHED -j ACCEPT
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y
          apt-get install -y iptables-persistent netfilter-persistent git
          netfilter-persistent save
          git clone https://github.com/ariasmon/proyecto-final.git /home/ubuntu/despliegue
          bash /home/ubuntu/despliegue/scripts/bootstrap.sh --bot-token "${TelegramBotToken}" --chat-id "${TelegramChatId}"

  WindowsInternal:
    Type: AWS::EC2::Instance
    DependsOn: UbuntuGateway
    Properties:
      InstanceType: t3.small
      ImageId: !Ref LatestWindowsAMI
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: "0"
          SubnetId: !Ref SubnetPrivada
          GroupSet: [!Ref SGInternal]
          PrivateIpAddress: 10.0.2.75
      Tags:
        - Key: Name
          Value: Windows-AD-TFG
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          $ErrorActionPreference = "Continue"
          $logFile = "C:\userdata-debug.log"

          function Write-UDLog {
              param([string]$Message)
              $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              $line = "[$ts] $Message"
              Write-Host $line
              $line | Out-File -FilePath $logFile -Append -Encoding UTF8
          }

          Write-UDLog "=========================================="
          Write-UDLog "UserData INICIANDO"
          Write-UDLog "=========================================="

          Write-UDLog "[1/5] Deshabilitando Firewall..."
          try {
              Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
              Write-UDLog "Firewall deshabilitado OK"
          } catch {
              Write-UDLog "ERROR Firewall: $($_.Exception.Message)"
          }

          Write-UDLog "[2/5] Obteniendo adaptador de red..."
          $adapter = Get-NetAdapter | Where-Object {$_.Status -eq 'Up'}
          if ($adapter) {
              $ifIndex = $adapter.ifIndex
              Write-UDLog "Adaptador: $($adapter.Name) - ifIndex: $ifIndex"
          } else {
              Write-UDLog "ERROR: No se encontro adaptador de red activo"
          }

          Write-UDLog "[3/5] Configurando IP estatica 10.0.2.75..."
          try {
              Remove-NetRoute -InterfaceIndex $ifIndex -DestinationPrefix "0.0.0.0/0" -Confirm:$false -ErrorAction SilentlyContinue
              New-NetIPAddress -InterfaceIndex $ifIndex -IPAddress 10.0.2.75 -PrefixLength 24 -DefaultGateway 10.0.2.1
              Write-UDLog "IP configurada OK"
          } catch {
              Write-UDLog "ERROR IP: $($_.Exception.Message)"
          }

          Write-UDLog "[4/5] Configurando DNS y ruta VPN..."
          try {
              Set-DnsClientServerAddress -InterfaceIndex $ifIndex -ServerAddresses ("10.0.0.2","8.8.8.8")
              Write-UDLog "DNS configurado OK"
          } catch {
              Write-UDLog "ERROR DNS: $($_.Exception.Message)"
          }
          try {
              route add 172.16.3.0 mask 255.255.255.0 10.0.2.1
              Write-UDLog "Ruta VPN OK"
          } catch {
              Write-UDLog "ERROR VPN route: $($_.Exception.Message)"
          }

          Write-UDLog "[5/5] Instalando roles y configurando..."
          try {
              Write-UDLog "Instalando AD DS..."
              Install-WindowsFeature -Name AD-Domain-Services -IncludeManagementTools | Out-Null
              Write-UDLog "Instalando IIS..."
              Install-WindowsFeature -Name Web-WebServer, Web-Windows-Auth, Web-CGI -IncludeManagementTools | Out-Null
              Write-UDLog "Instalando Windows Server Backup..."
              Install-WindowsFeature -Name Windows-Server-Backup -IncludeManagementTools | Out-Null
              Write-UDLog "Roles instalados OK"
          } catch {
              Write-UDLog "ERROR instalando roles: $($_.Exception.Message)"
          }

          try {
              Write-UDLog "Habilitando RDP..."
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
              Start-Service TermService -ErrorAction SilentlyContinue
              Set-Service -Name TermService -StartupType Automatic
              New-NetFirewallRule -DisplayName "RDP" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow -ErrorAction SilentlyContinue | Out-Null
              Write-UDLog "RDP habilitado OK"
          } catch {
              Write-UDLog "ERROR RDP: $($_.Exception.Message)"
          }

          Write-UDLog "Creando TFG-Stage2 (post-reboot)..."
          $stage2Script = @'
          $ErrorActionPreference = "Continue"
          $logFile = "C:\stage2-debug.log"
          function Write-S2Log { param([string]$m); $t = Get-Date -Format "yyyy-MM-dd HH:mm:ss"; $l = "[$t] $m"; Write-Host $l; $l | Out-File -FilePath $logFile -Append -Encoding UTF8 }
          Write-S2Log "Stage2: Esperando DNS..."
          $dnsResolved = $false
          for ($i = 1; $i -le 30; $i++) {
              try { [System.Net.Dns]::GetHostAddresses("github.com") | Out-Null; $dnsResolved = $true; Write-S2Log "DNS resuelto"; break } catch { Write-S2Log "DNS no disponible, intento $i/30"; Start-Sleep -Seconds 10 }
          }
          if ($dnsResolved) {
              Write-S2Log "Descargando bootstrap-windows.ps1..."
              try {
                  Invoke-WebRequest -Uri "https://raw.githubusercontent.com/ariasmon/proyecto-final/main/scripts/bootstrap-windows.ps1" -OutFile "C:\bootstrap-windows.ps1" -UseBasicParsing
                  Write-S2Log "Ejecutando bootstrap-windows.ps1..."
                  powershell -ExecutionPolicy Bypass -File "C:\bootstrap-windows.ps1"
                  Write-S2Log "Bootstrap completado"
              } catch {
                  Write-S2Log "ERROR: $($_.Exception.Message)"
              }
          }
          Unregister-ScheduledTask -TaskName "TFG-Stage2" -Confirm:$false -ErrorAction SilentlyContinue
          '@
          Set-Content -Path "C:\bootstrap-stage2.ps1" -Value $stage2Script -Encoding UTF8
          $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -File C:\bootstrap-stage2.ps1"
          $trigger = New-ScheduledTaskTrigger -AtStartup
          $principal = New-ScheduledTaskPrincipal -UserId "NT AUTHORITY\SYSTEM" -LogonType ServiceAccount -RunLevel Highest
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
          Register-ScheduledTask -TaskName "TFG-Stage2" -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
          Write-UDLog "TFG-Stage2 creado OK"

          Write-UDLog "Promocionando a Domain Controller..."
          Import-Module ADDSDeployment
          $pwd = ConvertTo-SecureString "${SafeModePassword}" -AsPlainText -Force
          Install-ADDSForest -DomainName "tfg.vp" -DomainNetBIOSName "TFG" -SafeModeAdministratorPassword $pwd -Force
          Write-UDLog "Promocion iniciada. El servidor se reiniciara automaticamente."

          Write-UDLog "=========================================="
          Write-UDLog "UserData FINALIZADO"
          Write-UDLog "=========================================="
          </powershell>

  BackupVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: 10
      VolumeType: gp3
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: Backup-Volume-TFG

  BackupVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref WindowsInternal
      VolumeId: !Ref BackupVolume
      Device: /dev/sdf

  ElasticIPGateway:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref UbuntuGateway

  RouteTablePublica:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: RT-Publica

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTablePublica
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  AsociacionPublica:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetPublica
      RouteTableId: !Ref RouteTablePublica

  RouteTablePrivada:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: RT-Privada

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTablePrivada
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref UbuntuGateway

  VpnRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTablePrivada
      DestinationCidrBlock: 172.16.3.0/24
      InstanceId: !Ref UbuntuGateway

  AsociacionPrivada:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetPrivada
      RouteTableId: !Ref RouteTablePrivada

Outputs:
  IPElasticaUbuntu:
    Description: IP publica del Gateway (SSH/WireGuard)
    Value: !Ref ElasticIPGateway
  URIGrafana:
    Description: URL de acceso a Grafana (solo via VPN)
    Value: "http://172.16.3.1:3000"
  URIPrometheus:
    Description: URL de acceso a Prometheus (solo desde VPC)
    Value: !Sub "http://${ElasticIPGateway}:9090"

