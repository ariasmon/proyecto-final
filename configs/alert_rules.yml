# Reglas de alerta para el TFG
# Colocar en: /etc/prometheus/alert_rules.yml

groups:
  - name: alertas_servidores
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Servidor {{ $labels.instance }} caído"
          description: "El servidor {{ $labels.instance }} lleva más de 1 minuto sin responder."

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU alta en {{ $labels.instance }}"
          description: "Uso de CPU superior al 80% durante 5 minutos."

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memoria alta en {{ $labels.instance }}"
          description: "Uso de memoria superior al 85%."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disco casi lleno en {{ $labels.instance }}"
          description: "Uso de disco superior al 85%."

  - name: alertas_windows
    rules:
      - alert: HighCPUWindows
        expr: 100 - (avg by(instance) (rate(windows_cpu_time_total{mode="idle"}[5m]))) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CPU alta en {{ $labels.instance }} (Windows)"
          description: "Uso de CPU superior al 90% durante 5 minutos en el servidor Windows."

      - alert: HighMemoryWindows
        expr: (1 - windows_os_physical_memory_free_bytes / windows_os_visible_memory_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memoria alta en {{ $labels.instance }} (Windows)"
          description: "Uso de memoria superior al 85% en el servidor Windows."

      - alert: DiskSpaceLowWindows
        expr: 100 - (windows_logical_disk_free_bytes{volume!~"HarddiskVolume.+"} / windows_logical_disk_size_bytes{volume!~"HarddiskVolume.+"} * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disco casi lleno en {{ $labels.instance }} (Windows)"
          description: "Uso de disco superior al 85% en el servidor Windows."

  - name: alertas_seguridad
    rules:
      - alert: PortScanDetected
        expr: rate(iptables_dropped_packets_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Posible escaneo de puertos detectado en {{ $labels.instance }}"
          description: "Se detectaron más de 10 paquetes denegados por segundo en el Gateway durante 2 minutos. Esto puede indicar un escaneo de puertos o un ataque de fuerza bruta."